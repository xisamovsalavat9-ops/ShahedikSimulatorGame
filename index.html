<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровая Панель | Выбор Игры</title>
    <style>
        /* Общие стили и футуристичный живой фон */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a153a 0%, #070514 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Декоративные светящиеся сферы на фоне для усиления эффекта блюра */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: min(300px, 40vw);
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }
        body::before {
            top: 15%;
            left: 20%;
            background: #00f2fe;
        }
        body::after {
            bottom: 15%;
            right: 20%;
            background: #4facfe;
        }

        /* Контейнер */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 1000px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* Сетка карточек с играми */
        .grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Стеклянные карточки (Glassmorphism с Blur) */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 30px;
            width: 340px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* Эффект при наведении на карточку */
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(0, 242, 254, 0.5);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.15), 
                        inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        /* Иконки-заглушки (вместо картинок) */
        .icon-box {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            font-size: 2.2rem;
            transition: transform 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1);
        }
        
        .card:hover .icon-box {
            transform: rotate(-5deg) scale(1.1);
        }

        /* Цветовые акценты для каждой игры */
        .game-planes .icon-box { color: #00f2fe; text-shadow: 0 0 15px rgba(0, 242, 254, 0.6); }
        .game-shooter .icon-box { color: #ff416c; text-shadow: 0 0 15px rgba(255, 65, 108, 0.6); }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
            transition: color 0.3s;
        }
        
        .card:hover h2 {
            color: #00f2fe;
        }
        
        .game-shooter:hover h2 {
            color: #ff416c;
        }

        .card p {
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        /* Кнопка "Запустить" внутри карточки */
        .play-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .game-planes:hover .play-btn {
            background: linear-gradient(45deg, #0072ff, #00f2fe);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.4);
            color: #000;
        }

        .game-shooter:hover .play-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            box-shadow: 0 8px 20px rgba(255, 65, 108, 0.4);
            color: #fff;
        }

        /* Адаптивность под мобилки */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .grid { flex-direction: column; align-items: center; }
            .card { width: 100%; max-width: 340px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ИГРОВАЯ КОНСОЛЬ</h1>
        <p class="subtitle">Выбери проект для запуска в локальной сети</p>

        <div class="grid">
            <!-- КАРТОЧКА ИГРЫ 1: САМОЛЕТЫ -->
            <a href="planes.html" class="card game-planes">
                <div class="icon-box">✈️</div>
                <h2>3D Симулятор</h2>
                <p>Управляй боевым самолетом "Шахед", маневрируй и играй по сети вместе с другом без задержек.</p>
                <button class="play-btn">Запустить</button>
            </a>

            <!-- КАРТОЧКА ИГРЫ 2: ШУТЕР -->
            <a href="shooter.html" class="card game-shooter">
                <div class="icon-box">💥</div>
                <h2>3D Шутер</h2>
                <p>Сетевой шутер от первого лица. Перестрелки на арене, подсчет фрагов и динамичный экшен.</p>
                <button class="play-btn">Запустить</button>
            </a>
        </div>
    </div>

</body>
</html>
